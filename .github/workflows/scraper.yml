name: TDS Table Scraper
on: [workflow_dispatch]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: "23f2004957@ds.study.iitm.ac.in - Setup Node"
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: "23f2004957@ds.study.iitm.ac.in - List files"
      run: ls -la
    
    - name: "23f2004957@ds.study.iitm.ac.in - Install packages"
      run: npm install
    
    - name: "23f2004957@ds.study.iitm.ac.in - Install Playwright"
      run: npx playwright install --with-deps
    
    - name: "23f2004957@ds.study.iitm.ac.in - Run scraper"
      run: node scraper.js
