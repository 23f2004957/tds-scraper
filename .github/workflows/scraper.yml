
name: TDS Table Scraper
on: [workflow_dispatch]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # SIMPLIFIED - No setup-node action
    - name: "23f2004957@ds.study.iitm.ac.in - Install Node & Playwright"
      run: |
        npm install playwright@1.44.0
        npx playwright install --with-deps
        node --version
        ls -la
    
    - name: "23f2004957@ds.study.iitm.ac.in - Run scraper"
      run: node scraper.js
