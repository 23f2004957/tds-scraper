name: "TDS Table Sums"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js for 23f2004957@ds.study.iitm.ac.in        
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install packages
        run: npm ci
      
      - name: Install Playwright
        run: npx playwright install --with-deps
      
      - name: Scrape TDS tables and sum numbers
        run: node scrape.js
